<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoSensei</title>
    <link rel="icon" type="image/png" href="ALGO (2).png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .code-font {
            font-family: 'JetBrains Mono', monospace;
        }
        /* For custom scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
        }
        .dark ::-webkit-scrollbar-track {
            background: #44475A;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #6272a4;
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb:hover {
            background: #ff79c6;
        }
        /* --- Animations --- */
        @keyframes fadeOutDown {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(20px); }
        }
        .animate-fadeOutDown {
            animation: fadeOutDown 0.5s ease-out forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeInUp {
            animation: fadeInUp 0.5s ease-in-out forwards;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.6); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .animate-pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.2, 0.8, 0.2, 1) infinite;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        dark: {
                            bg: '#282a36',
                            'bg-secondary': '#44475a',
                            'accent': '#ff79c6',
                            'accent-hover': '#ff92d4',
                            'text-primary': '#f8f8f2',
                            'text-secondary': '#bd93f9',
                            'border': '#6272a4',
                        },
                        light: {
                            bg: '#f8f9fa',
                            'bg-secondary': '#ffffff',
                            'accent': '#ff79c6',
                            'accent-hover': '#ff50b3',
                            'text-primary': '#212529',
                            'text-secondary': '#495057',
                            'border': '#dee2e6',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-light-bg dark:bg-dark-bg text-light-text-primary dark:text-dark-text-primary transition-colors duration-300">
    
    <!-- Engine Animation Container -->
    <div id="engine-loader" class="hidden fixed inset-0 bg-dark-bg/90 backdrop-blur-sm z-50 flex-col items-center justify-center overflow-hidden">
        <div class="relative w-28 h-28 flex items-center justify-center">
            <div class="absolute w-full h-full rounded-full border-2 border-dark-accent/50 animate-pulse-ring" style="animation-delay: 0s;"></div>
            <div class="absolute w-full h-full rounded-full border-2 border-dark-accent/50 animate-pulse-ring" style="animation-delay: 0.6s;"></div>
            <div class="absolute w-full h-full rounded-full border-2 border-dark-accent/50 animate-pulse-ring" style="animation-delay: 1.2s;"></div>
            <div class="w-10 h-10 bg-dark-accent rounded-full shadow-lg shadow-dark-accent/50"></div>
        </div>
        <p class="text-white mt-6 text-lg font-medium animate-fadeInUp tracking-wider">Starting Analysis Engine...</p>
    </div>

    <!-- Main Container -->
    <div id="app" class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="flex items-center justify-between px-3 py-0 border-b border-light-border dark:border-dark-border bg-light-bg-secondary/80 dark:bg-dark-bg/80 backdrop-blur-sm shadow-sm sticky top-0 z-10 w-full relative">
            <a href="#" id="home-link" class="flex items-center gap-2 text-xl font-bold z-10 cursor-pointer group"> 
                <img src="ALGO (1).png" alt="AlgoSensei Logo" class="h-20 -my-3 transition-transform group-hover:scale-110">
            </a>
            <nav class="hidden md:flex items-center gap-2 text-sm font-medium absolute left-1/2 -translate-x-1/2 bg-light-bg-secondary/50 dark:bg-dark-bg-secondary/50 backdrop-blur-md rounded-full border border-light-border/50 dark:border-dark-border/50 p-2 shadow-md">
                <a href="about.html" class="px-4 py-1 rounded-full text-light-text-secondary dark:text-dark-text-secondary hover:text-light-text-primary dark:hover:text-dark-text-primary hover:bg-gray-200 dark:hover:bg-gray-600 transition-all">About</a>
                <a href="features.html" class="px-4 py-1 rounded-full text-light-text-secondary dark:text-dark-text-secondary hover:text-light-text-primary dark:hover:text-dark-text-primary hover:bg-gray-200 dark:hover:bg-gray-600 transition-all">Features</a>
                <a href="contact.html" class="px-4 py-1 rounded-full text-light-text-secondary dark:text-dark-text-secondary hover:text-light-text-primary dark:hover:text-dark-text-primary hover:bg-gray-200 dark:hover:bg-gray-600 transition-all">Contact</a>
            </nav>
            <div class="flex items-center gap-2 z-10">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-dark-accent">
                    <svg id="theme-icon-sun" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                    <svg id="theme-icon-moon" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                </button>
                <!-- Hamburger Menu Button -->
                <button id="mobile-menu-btn" class="p-2 rounded-md md:hidden hover:bg-gray-200 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-dark-accent">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </div>
        </header>

        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-light-bg-secondary/95 dark:bg-dark-bg/95 backdrop-blur-sm absolute top-[60px] left-0 right-0 z-20">
            <nav class="flex flex-col items-center gap-4 p-4">
                <a href="about.html" class="px-4 py-2 rounded-full text-light-text-secondary dark:text-dark-text-secondary hover:text-light-text-primary dark:hover:text-dark-text-primary hover:bg-gray-200 dark:hover:bg-gray-600 transition-all">About</a>
                <a href="features.html" class="px-4 py-2 rounded-full text-light-text-secondary dark:text-dark-text-secondary hover:text-light-text-primary dark:hover:text-dark-text-primary hover:bg-gray-200 dark:hover:bg-gray-600 transition-all">Features</a>
                <a href="contact.html" class="px-4 py-2 rounded-full text-light-text-secondary dark:text-dark-text-secondary hover:text-light-text-primary dark:hover:text-dark-text-primary hover:bg-gray-200 dark:hover:bg-gray-600 transition-all">Contact</a>
            </nav>
        </div>

        <!-- Input Screen -->
        <main id="input-screen" class="flex-grow flex flex-col items-center justify-center p-4 md:p-8">
            <div class="w-full max-w-7xl mx-auto">
                <div class="text-center mb-8 animate-fadeInUp" style="animation-delay: 100ms;">
                    <h2 class="text-3xl md:text-4xl font-bold">Your Personal AI Coding Sensei</h2>
                    <p class="text-light-text-secondary dark:text-dark-text-secondary mt-2">for Competitive Programmers & Interview Prep</p>
                </div>
                <div class="w-full max-w-6xl mx-auto flex flex-col md:flex-row gap-6 animate-fadeInUp" style="animation-delay: 200ms;">
                    <div class="flex-1 flex flex-col">
                        <label for="problem-description" class="mb-2 font-semibold flex items-center gap-2">
                             <svg class="w-5 h-5 text-light-text-secondary dark:text-dark-text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            Problem Description
                        </label>
                        <textarea id="problem-description" class="code-font p-4 rounded-lg flex-grow bg-light-bg-secondary dark:bg-dark-bg-secondary border border-light-border dark:border-dark-border focus:outline-none focus:ring-2 focus:ring-dark-accent resize-none shadow-md transition-shadow hover:shadow-lg focus:shadow-xl"></textarea>
                    </div>
                    <div class="flex-1 flex flex-col">
                        <label for="code-solution" class="mb-2 font-semibold flex items-center gap-2">
                             <svg class="w-5 h-5 text-light-text-secondary dark:text-dark-text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                            Your Code Solution
                        </label>
                        <div class="flex-grow flex flex-col bg-light-bg-secondary dark:bg-dark-bg-secondary rounded-lg border border-light-border dark:border-dark-border shadow-md transition-shadow hover:shadow-lg focus-within:ring-2 focus-within:ring-dark-accent focus-within:shadow-xl">
                            <textarea id="code-solution" class="code-font p-4 flex-grow bg-transparent focus:outline-none resize-none" placeholder="```python&#10;# Your Python code goes here&#10;```"></textarea>
                            <div class="p-2 border-t border-light-border dark:border-dark-border">
                                 <select id="language-select" class="bg-transparent text-light-text-primary dark:text-dark-text-primary text-sm focus:outline-none w-full cursor-pointer">
                                    <option value="python" class="bg-light-bg-secondary dark:bg-dark-bg-secondary text-light-text-primary dark:text-dark-text-primary">Python</option>
                                    <option value="javascript" class="bg-light-bg-secondary dark:bg-dark-bg-secondary text-light-text-primary dark:text-dark-text-primary">JavaScript</option>
                                    <option value="java" class="bg-light-bg-secondary dark:bg-dark-bg-secondary text-light-text-primary dark:text-dark-text-primary">Java</option>
                                    <option value="cpp" class="bg-light-bg-secondary dark:bg-dark-bg-secondary text-light-text-primary dark:text-dark-text-primary">C++</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="text-center">
                    <button id="coach-me-btn" class="mt-8 px-8 py-3 bg-dark-accent text-white font-bold rounded-lg shadow-lg hover:shadow-xl transition-all transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-pink-300 dark:focus:ring-pink-800 animate-fadeInUp" style="animation-delay: 300ms;">
                        Coach Me!
                    </button>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer id="footer" class="p-6 text-center border-t border-light-border dark:border-dark-border bg-light-bg-secondary dark:bg-dark-bg-secondary">
            <div class="max-w-6xl mx-auto">
                <div class="flex flex-col md:flex-row justify-center md:justify-between items-center gap-4">
                    <div class="hidden md:block text-light-text-secondary dark:text-dark-text-secondary text-center md:text-left">
                        <p class="font-semibold text-light-text-primary dark:text-dark-text-primary">AlgoSensei</p>
                        <p class="text-sm">Your Personal AI Coding Sensei</p>
                    </div>
                    <div class="text-sm text-light-text-secondary dark:text-dark-text-secondary text-center md:text-right">
                        <p>&copy; 2025 AlgoSensei. All Rights Reserved.</p>
                        <p class="hidden md:block">Built with ❤️ for coders.</p>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const engineLoader = document.getElementById('engine-loader');
            const mainContent = document.getElementById('input-screen');
            const coachMeBtn = document.getElementById('coach-me-btn');
            const problemDescription = document.getElementById('problem-description');
            const codeSolution = document.getElementById('code-solution');
            const languageSelect = document.getElementById('language-select');
            
            const themeToggle = document.getElementById('theme-toggle');
            const sunIcon = document.getElementById('theme-icon-sun');
            const moonIcon = document.getElementById('theme-icon-moon');
            
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');

            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                moonIcon.classList.add('hidden');
                sunIcon.classList.remove('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }

            themeToggle.addEventListener('click', () => {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                sunIcon.classList.toggle('hidden');
                moonIcon.classList.toggle('hidden');
            });
            
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });

            coachMeBtn.addEventListener('click', () => {
                // Save data to localStorage to pass to the next page
                localStorage.setItem('problem', problemDescription.value);
                localStorage.setItem('code', codeSolution.value);
                localStorage.setItem('language', languageSelect.value);

                // Show animation and then redirect
                mainContent.classList.add('animate-fadeOutDown');
                
                setTimeout(() => {
                    engineLoader.classList.remove('hidden');
                    engineLoader.classList.add('flex');
                }, 400);

                setTimeout(() => {
                    window.location.href = 'coach.html';
                }, 2800);
            });
        });
    </script>

</body>
</html>
