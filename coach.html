<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=2.0">
    <title>AlgoSensei</title>
    <link rel="icon" type="image/png" href="ALGO (2).png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Highlight.js for Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .code-font, .hljs {
            font-family: 'JetBrains Mono', monospace !important;
        }
        pre code.hljs {
            border-radius: 0.5rem;
            padding: 1rem !important;
        }
        /* For custom scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
        }
        .dark ::-webkit-scrollbar-track {
            background: #44475A;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #6272a4;
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb:hover {
            background: #ff79c6;
        }
        .chat-bubble-ai::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: -8px;
            width: 0;
            height: 0;
            border-bottom: 12px solid;
            border-left: 12px solid transparent;
        }
        .dark .chat-bubble-ai::before {
             border-bottom-color: #44475A;
        }
        .light .chat-bubble-ai::before {
             border-bottom-color: #e5e7eb;
        }

        .chat-bubble-user::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: -8px;
            width: 0;
            height: 0;
            border-bottom: 12px solid #FF79C6;
            border-right: 12px solid transparent;
        }
        .dark .chat-bubble-user {
            background-color: #FF79C6;
        }
        code.inline-code {
            font-family: 'JetBrains Mono', monospace;
            background-color: rgba(0,0,0,0.2);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .dark code.inline-code {
             background-color: #282a36;
        }
        .light code.inline-code {
            background-color: #e5e7eb;
        }

        /* --- Animations --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeInUp {
            animation: fadeInUp 0.5s ease-in-out forwards;
        }
        
        @keyframes messageIn {
             from { opacity: 0; transform: translateY(10px) scale(0.95); }
             to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-message-in {
            animation: messageIn 0.3s ease-out forwards;
        }

        @keyframes typing-dot {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-3px); }
        }
        .typing-dot {
            animation: typing-dot 1.2s infinite ease-in-out;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        dark: {
                            bg: '#282a36',
                            'bg-secondary': '#44475a',
                            'accent': '#ff79c6',
                            'accent-hover': '#ff92d4',
                            'text-primary': '#f8f8f2',
                            'text-secondary': '#bd93f9',
                            'border': '#6272a4',
                        },
                        light: {
                            bg: '#f8f9fa',
                            'bg-secondary': '#ffffff',
                            'accent': '#ff79c6',
                            'accent-hover': '#ff50b3',
                            'text-primary': '#212529',
                            'text-secondary': '#495057',
                            'border': '#dee2e6',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-light-text-primary dark:text-dark-text-primary transition-colors duration-300">
    
    <!-- Main Container -->
    <div id="app" class="h-screen flex flex-col">
        <!-- Header -->
        <header class="flex items-center justify-between px-3 py-0 border-b border-light-border dark:border-dark-border bg-light-bg-secondary/80 dark:bg-dark-bg/80 backdrop-blur-sm shadow-sm sticky top-0 z-10 w-full relative">
            <a href="index.html" id="home-link" class="flex items-center gap-2 text-xl font-bold z-10 cursor-pointer group"> 
                <img src="ALGO (1).png" alt="AlgoSensei Logo" class="h-20 -my-3 transition-transform group-hover:scale-110">
            </a>
            <nav class="hidden md:flex items-center gap-2 text-sm font-medium absolute left-1/2 -translate-x-1/2 bg-light-bg-secondary/50 dark:bg-dark-bg-secondary/50 backdrop-blur-md rounded-full border border-light-border/50 dark:border-dark-border/50 p-2 shadow-md">
                <a href="about.html" class="px-4 py-1 rounded-full text-light-text-secondary dark:text-dark-text-secondary hover:text-light-text-primary dark:hover:text-dark-text-primary hover:bg-gray-200 dark:hover:bg-gray-600 transition-all">About</a>
                <a href="features.html" class="px-4 py-1 rounded-full text-light-text-secondary dark:text-dark-text-secondary hover:text-light-text-primary dark:hover:text-dark-text-primary hover:bg-gray-200 dark:hover:bg-gray-600 transition-all">Features</a>
                <a href="contact.html" class="px-4 py-1 rounded-full text-light-text-secondary dark:text-dark-text-secondary hover:text-light-text-primary dark:hover:text-dark-text-primary hover:bg-gray-200 dark:hover:bg-gray-600 transition-all">Contact</a>
            </nav>
            <div class="flex items-center gap-2 z-10">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-dark-accent">
                    <svg id="theme-icon-sun" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                    <svg id="theme-icon-moon" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                </button>
                <!-- Hamburger Menu Button -->
                <button id="mobile-menu-btn" class="p-2 rounded-md md:hidden hover:bg-gray-200 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-dark-accent">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </div>
        </header>

        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-light-bg-secondary/95 dark:bg-dark-bg/95 backdrop-blur-sm absolute top-[60px] left-0 right-0 z-20">
            <nav class="flex flex-col items-center gap-4 p-4">
                <a href="about.html" class="px-4 py-2 rounded-full text-light-text-secondary dark:text-dark-text-secondary hover:text-light-text-primary dark:hover:text-dark-text-primary hover:bg-gray-200 dark:hover:bg-gray-600 transition-all">About</a>
                <a href="features.html" class="px-4 py-2 rounded-full text-light-text-secondary dark:text-dark-text-secondary hover:text-light-text-primary dark:hover:text-dark-text-primary hover:bg-gray-200 dark:hover:bg-gray-600 transition-all">Features</a>
                <a href="contact.html" class="px-4 py-2 rounded-full text-light-text-secondary dark:text-dark-text-secondary hover:text-light-text-primary dark:hover:text-dark-text-primary hover:bg-gray-200 dark:hover:bg-gray-600 transition-all">Contact</a>
            </nav>
        </div>

        <!-- Coach Screen -->
        <main id="coach-screen" class="flex-grow flex flex-col md:flex-row md:gap-4 overflow-hidden animate-fadeInUp py-4 md:p-4">
            <!-- Context Panel -->
            <aside id="context-panel" class="w-full md:w-1/3 xl:w-1/4 md:h-full flex-shrink-0 flex flex-col bg-light-bg-secondary dark:bg-dark-bg-secondary border border-light-border dark:border-dark-border transition-all duration-300 rounded-lg shadow-md mb-4 md:mb-0">
                <div class="flex-shrink-0 p-2 border-b border-light-border dark:border-dark-border flex items-center justify-between z-10">
                    <div class="flex bg-gray-200 dark:bg-dark-bg rounded-md p-1 relative w-full">
                        <div id="tab-highlighter" class="absolute top-1 left-1 h-[calc(100%-8px)] w-1/2 bg-white dark:bg-dark-bg-secondary rounded-md shadow-sm transition-transform duration-300 ease-in-out"></div>
                        <button id="tab-problem" class="tab-btn flex-1 p-1.5 text-sm font-semibold rounded-md z-10">Problem</button>
                        <button id="tab-code" class="tab-btn flex-1 p-1.5 text-sm font-semibold rounded-md z-10">Your Code</button>
                    </div>
                    <button id="context-toggle-btn" class="p-2 rounded-md md:hidden ml-2 hover:bg-gray-200 dark:hover:bg-gray-700">
                        <svg id="context-arrow-down" class="w-5 h-5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        <svg id="context-arrow-up" class="w-5 h-5 transition-transform hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                    </button>
                </div>
                <div id="context-content" class="flex-grow overflow-y-auto p-4 text-sm hidden md:block">
                    <div id="context-problem" class="code-font leading-relaxed"></div>
                    <div id="context-code" class="hidden">
                        <pre><code id="code-block" class="hljs"></code></pre>
                    </div>
                </div>
            </aside>

            <!-- Chat Panel -->
            <section class="flex-1 flex flex-col bg-light-bg dark:bg-dark-bg rounded-lg shadow-md border border-light-border dark:border-dark-border overflow-hidden" style="background-image: radial-gradient(circle at center, rgba(255, 255, 255, 0.03) 0%, transparent 70%);">
                <div class="flex-grow py-4 md:py-6 overflow-y-auto" id="chat-log">
                    <!-- Chat messages will be appended here -->
                </div>
                <div id="typing-indicator" class="hidden items-center pb-4 flex-shrink-0">
                     <div class="w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center text-sm font-bold shadow-sm bg-gray-300 dark:bg-gray-600 mr-3 text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.196-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.783-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>
                    </div>
                    <div class="px-4 py-3 rounded-xl relative shadow-md bg-light-bg-secondary dark:bg-dark-bg-secondary text-light-text-primary dark:text-dark-text-primary">
                        <div class="flex items-center gap-2">
                           <span class="font-medium text-sm">Sensei is thinking</span>
                           <div class="typing-dot h-1.5 w-1.5 bg-dark-accent rounded-full" style="animation-delay: 0.1s;"></div>
                           <div class="typing-dot h-1.5 w-1.5 bg-dark-accent rounded-full" style="animation-delay: 0.2s;"></div>
                           <div class="typing-dot h-1.5 w-1.5 bg-dark-accent rounded-full" style="animation-delay: 0.3s;"></div>
                        </div>
                    </div>
                </div>

                <div class="flex-shrink-0 py-4 md:p-4 bg-light-bg-secondary/80 dark:bg-dark-bg-secondary/80 backdrop-blur-sm rounded-b-lg">
                    <div class="flex items-center space-x-3 bg-light-bg-secondary dark:bg-dark-bg-secondary rounded-xl border border-light-border dark:border-dark-border p-2 focus-within:ring-2 focus-within:ring-dark-accent transition-all">
                        <input type="text" id="chat-input" placeholder="Send a message..." class="w-full p-2 bg-transparent focus:outline-none">
                        <button id="send-btn" class="p-3 bg-dark-accent text-white rounded-lg hover:bg-dark-accent-hover transition-transform transform hover:scale-110 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-dark-bg-secondary focus:ring-dark-accent">
                             <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5"></path></svg>
                        </button>
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer id="footer" class="p-6 text-center bg-light-bg-secondary dark:bg-dark-bg-secondary flex-shrink-0">
            <div class="max-w-6xl mx-auto">
                <div class="flex flex-col md:flex-row justify-center md:justify-between items-center gap-4">
                    <div class="hidden md:block text-light-text-secondary dark:text-dark-text-secondary text-center md:text-left">
                        <p class="font-semibold text-light-text-primary dark:text-dark-text-primary">AlgoSensei</p>
                        <p class="text-sm">Your Personal AI Coding Sensei</p>
                    </div>
                    <div class="text-sm text-light-text-secondary dark:text-dark-text-secondary text-center md:text-right">
                        <p>&copy; 2025 AlgoSensei. All Rights Reserved.</p>
                        <p class="hidden md:block">Built with ❤️ for coders.</p>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const contextProblem = document.getElementById('context-problem');
            const contextCode = document.getElementById('context-code');
            const codeBlock = document.getElementById('code-block');
            const tabProblem = document.getElementById('tab-problem');
            const tabCode = document.getElementById('tab-code');
            const tabHighlighter = document.getElementById('tab-highlighter');
            const contextToggleBtn = document.getElementById('context-toggle-btn');
            const contextContent = document.getElementById('context-content');
            const contextArrowDown = document.getElementById('context-arrow-down');
            const contextArrowUp = document.getElementById('context-arrow-up');

            const chatLog = document.getElementById('chat-log');
            const chatInput = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            const typingIndicator = document.getElementById('typing-indicator');

            const themeToggle = document.getElementById('theme-toggle');
            const sunIcon = document.getElementById('theme-icon-sun');
            const moonIcon = document.getElementById('theme-icon-moon');

            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');

            // Get the header element to calculate its height
            const header = document.querySelector('header');

            // Use a variable for the backend URL for easy switching
            const isLocal = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
            const BACKEND_URL = isLocal ? 'http://127.0.0.1:8000' : 'https://your-render-app-name.onrender.com'; // <-- IMPORTANT: Change this to your Render URL

            // --- Theme Toggling ---
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                moonIcon.classList.add('hidden');
                sunIcon.classList.remove('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }

            themeToggle.addEventListener('click', () => {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                sunIcon.classList.toggle('hidden');
                moonIcon.classList.toggle('hidden');
            });

            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
                // Set the top position of the mobile menu dynamically
                mobileMenu.style.top = `${header.offsetHeight}px`;
            });
            
            // --- Initial Data Loading ---
            const problem = localStorage.getItem('problem') || "No problem description provided.";
            const code = localStorage.getItem('code') || "No code provided.";
            const language = localStorage.getItem('language') || "python";
            
            contextProblem.innerText = problem;
            codeBlock.textContent = code;
            codeBlock.className = `language-${language}`;
            hljs.highlightElement(codeBlock);

            // --- Live Conversation Data ---
            let chatHistory = [];
            
            // --- UI Logic ---
            tabProblem.addEventListener('click', () => {
                contextProblem.classList.remove('hidden');
                contextCode.classList.add('hidden');
                tabHighlighter.style.transform = 'translateX(0%)';
            });

            tabCode.addEventListener('click', () => {
                contextCode.classList.remove('hidden');
                contextProblem.classList.add('hidden');
                tabHighlighter.style.transform = 'translateX(100%)';
            });

            contextToggleBtn.addEventListener('click', () => {
                contextContent.classList.toggle('hidden');
                contextArrowDown.classList.toggle('hidden');
                contextArrowUp.classList.toggle('hidden');
            });
            
            // --- Chat Functionality ---
            function showTypingIndicator() {
                typingIndicator.classList.remove('hidden');
                typingIndicator.classList.add('flex');
                chatLog.scrollTop = chatLog.scrollHeight;
            }

            function hideTypingIndicator() {
                typingIndicator.classList.add('hidden');
                typingIndicator.classList.remove('flex');
            }

            function appendMessage(sender, text) {
                const messageWrapper = document.createElement('div');
                const messageBubble = document.createElement('div');
                const icon = document.createElement('div');
                
                messageWrapper.classList.add('flex', 'items-end', 'mb-4', 'w-11/12', 'md:max-w-xl', 'animate-message-in');
                // Add a data attribute to easily select messages later
                messageWrapper.dataset.sender = sender;
                messageBubble.classList.add('px-4', 'py-3', 'rounded-xl', 'relative', 'shadow-md');
                icon.classList.add('w-10', 'h-10', 'rounded-full', 'flex-shrink-0', 'flex', 'items-center', 'justify-center', 'text-sm', 'font-bold', 'shadow-sm');

                if (sender === 'ai') {
                    messageWrapper.classList.add('mr-auto');
                    messageBubble.classList.add('bg-light-bg-secondary', 'dark:bg-dark-bg-secondary', 'text-light-text-primary', 'dark:text-dark-text-primary', 'chat-bubble-ai');
                    icon.classList.add('bg-gray-300', 'dark:bg-gray-600', 'mr-3', 'text-white');
                    icon.innerHTML = `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.196-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.783-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>`;
                } else {
                    messageWrapper.classList.add('ml-auto', 'flex-row-reverse');
                    messageBubble.classList.add('bg-dark-accent', 'text-white', 'chat-bubble-user');
                    icon.classList.add('bg-pink-300', 'dark:bg-pink-800', 'ml-3', 'text-white');
                    icon.innerHTML = `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>`;
                }
                
                messageBubble.innerHTML = text
                    .replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>')
                    .replace(/\*(.*?)\*/g, '<i>$1</i>')
                    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');

                if (sender === 'ai') {
                    messageWrapper.appendChild(icon);
                    messageWrapper.appendChild(messageBubble);
                } else {
                    messageWrapper.appendChild(icon);
                    messageWrapper.appendChild(messageBubble);
                }
                chatLog.appendChild(messageWrapper);
                chatLog.scrollTop = chatLog.scrollHeight;

                // Add to our local history state
                // The AI expects roles of 'user' and 'model'
                const role = sender === 'ai' ? 'model' : 'user';
                chatHistory.push({ role: role, parts: [{ text: text }] });
            }

            async function startConversation() {
                showTypingIndicator();
                try {
                    const response = await fetch(`${BACKEND_URL}/api/start_session`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ problem, code, language })
                    });

                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                    const firstMessage = await response.json();
                    
                    setTimeout(() => {
                        hideTypingIndicator();
                        appendMessage(firstMessage.from, firstMessage.text); // 'from' is an alias for 'sender'
                    }, 800);
                } catch (error) {
                    hideTypingIndicator();
                    appendMessage('ai', `I couldn't connect to my brain... 🧠 Is the backend server running? <br><small class="opacity-70">${error}</small>`);
                }
            }

            function handleSend() {
                const userText = chatInput.value.trim();
                if (userText) {
                    appendMessage('user', userText);
                    chatInput.value = '';
                    showTypingIndicator();
                    
                    // Call a new function to get the *next* AI response
                    getContinuationResponse(); 
                }
            }

            async function getContinuationResponse() {
                showTypingIndicator();
                try {
                    // Call the /api/chat endpoint
                    const response = await fetch(`${BACKEND_URL}/api/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        // Send the problem, code, AND the entire chat history
                        body: JSON.stringify({ 
                            problem: problem, 
                            code: code, 
                            language: language,
                            history: chatHistory 
                        })
                    });

                    if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);

                    const aiData = await response.json();

                    setTimeout(() => {
                        hideTypingIndicator();
                        // The AI response is NOT added to history here, because appendMessage does it.
                        appendMessage(aiData.from, aiData.text);
                    }, 800);
                } catch (error) {
                    hideTypingIndicator();
                    appendMessage('ai', "There was an error continuing our conversation. Please try again.");
                }
            }

            sendBtn.addEventListener('click', handleSend);
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    handleSend();
                }
            });
            
            // Start the conversation automatically when the page loads
            startConversation();
        });
    </script>

</body>
</html>
